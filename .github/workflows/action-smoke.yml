name: Composite Action Smoke Test

on:
  workflow_dispatch:
  push:
    paths:
      - action.yml
      - scripts/action_entrypoint.py
      - scripts/issue_scout.py
      - examples/sample_issues.json
      - .github/workflows/action-smoke.yml
  pull_request:
    paths:
      - action.yml
      - scripts/action_entrypoint.py
      - scripts/issue_scout.py
      - examples/sample_issues.json
      - .github/workflows/action-smoke.yml

permissions:
  contents: read

jobs:
  offline-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - id: scout
        uses: ./
        with:
          offline-input: examples/sample_issues.json
          min-score: "60"
          output: reports/action-smoke.html
          format: html
      - name: Verify Action outputs
        shell: bash
        run: |
          test "${{ steps.scout.outputs.report-path }}" = "reports/action-smoke.html"
          test "${{ steps.scout.outputs.report-format }}" = "html"
          grep -q "<!doctype html>" reports/action-smoke.html
          grep -q "GitHub Opportunity Report" reports/action-smoke.html
      - uses: actions/upload-artifact@v7
        with:
          name: action-smoke-report
          path: reports/action-smoke.html
          if-no-files-found: error
