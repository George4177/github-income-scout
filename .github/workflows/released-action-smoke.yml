name: Released Action Consumer Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  consume-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - id: scout
        uses: George4177/github-income-scout@v0.5.0
        with:
          offline-input: examples/sample_issues.json
          min-score: "60"
          output: reports/released-action-smoke.html
          format: html
      - name: Verify released Action outputs
        shell: bash
        run: |
          test "${{ steps.scout.outputs.report-path }}" = "reports/released-action-smoke.html"
          test "${{ steps.scout.outputs.report-format }}" = "html"
          grep -qi '<!doctype html>' reports/released-action-smoke.html
          grep -q 'GitHub Opportunity Report' reports/released-action-smoke.html
      - uses: actions/upload-artifact@v7
        with:
          name: released-action-smoke-html
          path: reports/released-action-smoke.html
          if-no-files-found: error
