name: Weekly GitHub Opportunity Scout

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1"

permissions:
  contents: read

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Prepare output directory
        run: mkdir -p reports/weekly-scout
      - name: Generate Markdown opportunity report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/issue_scout.py --config examples/queries.json --min-score 60 --include-rejected --enrich-repos --output reports/weekly-scout/opportunity-report.md
      - name: Generate JSON opportunity report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/issue_scout.py --config examples/queries.json --min-score 60 --include-rejected --enrich-repos --format json --output reports/weekly-scout/opportunities.json
      - name: Generate CSV opportunity report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/issue_scout.py --config examples/queries.json --min-score 60 --include-rejected --enrich-repos --format csv --output reports/weekly-scout/opportunities.csv
      - name: Generate HTML opportunity report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/issue_scout.py --config examples/queries.json --min-score 60 --include-rejected --enrich-repos --format html --output reports/weekly-scout/opportunities.html
      - name: Generate Starter Audit bundle summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/build_audit_bundle.py --config examples/queries.json --output-dir reports/weekly-scout/starter-audit-bundle --min-score 60 --enrich-repos
      - name: Upload weekly scout reports
        uses: actions/upload-artifact@v7
        with:
          name: weekly-scout-reports
          path: reports/weekly-scout
          if-no-files-found: error
